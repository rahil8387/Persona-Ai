<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Persona AI Studio - Live Session</title>
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        
        body, html { 
            background-color: #202124; /* Google Meet dark grey */
            color: #E2E8F0; 
            font-family: 'Outfit', sans-serif; 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            overflow: hidden;
        }

        /* Layout */
        .meet-container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        .video-area {
            flex: 1;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .avatar-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Bottom Control Bar */
        .bottom-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 20px 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        .control-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #3C4043;
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .control-btn:hover { background: #5F6368; }
        
        .control-btn.end-call { background: #EA4335; }
        .control-btn.end-call:hover { background: #D93025; }

        .control-btn.listening { 
            background: #00FF88; 
            color: #0A0D14;
            box-shadow: 0 0 15px #00FF88; 
            animation: pulse 1.5s infinite; 
        }

        /* Customization Selector */
        .persona-selector {
            position: absolute;
            bottom: 25px;
            left: 30px;
            background: rgba(60, 64, 67, 0.8);
            backdrop-filter: blur(5px);
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid #5F6368;
            color: white;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
        }

        /* Right Side Chat */
        .chat-sidebar {
            width: 360px;
            background: #202124;
            display: flex;
            flex-direction: column;
            border-left: 1px solid #3C4043;
            box-shadow: -5px 0 20px rgba(0,0,0,0.3);
        }

        .chat-header {
            padding: 20px;
            border-bottom: 1px solid #3C4043;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h3 { margin: 0; color: #00FF88; font-weight: 600; }

        .chat-box { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            background: #202124; 
        }

        .chat-message { margin-bottom: 15px; }
        .chat-message.ai { color: #00E5FF; }
        .chat-message.user { color: #00FF88; }
        .chat-message.error { color: #EA4335; }

        .input-area { 
            padding: 20px;
            background: #202124;
            border-top: 1px solid #3C4043;
            display: flex; 
            gap: 10px; 
            align-items: center; 
        }
        
        input { 
            flex: 1; 
            padding: 12px; 
            border-radius: 20px; 
            border: 1px solid #5F6368; 
            background: #3C4043; 
            color: white; 
            outline: none;
        }
        
        .send-btn { 
            width: 42px;
            height: 42px;
            background: #00FF88; 
            color: #0A0D14; 
            border: none; 
            border-radius: 50%; 
            font-weight: bold; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
    </style>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>

    <div class="meet-container">
        
        <!-- Main Video Feed -->
        <div class="video-area">
            <video autoplay loop muted playsinline class="avatar-video">
                <source src="avatar.mp4" type="video/mp4">
            </video>
            
            <select id="personaSelect" class="persona-selector" onchange="changePersona()">
                <option value="English Tutor">🏫 English Tutor</option>
                <option value="Admission Counselor">🎓 Admission Counselor</option>
                <option value="Medical Assistant">🩺 Medical Assistant</option>
                <option value="General Help">💬 Helpful Assistant for Anyone</option>
            </select>

            <div class="bottom-bar">
                <button class="control-btn" id="micBtn" onclick="toggleVoice()"><i class="fa-solid fa-microphone"></i></button>
                <button class="control-btn"><i class="fa-solid fa-video"></i></button>
                <button class="control-btn"><i class="fa-regular fa-face-smile"></i></button>
                <a href="index.html" class="control-btn end-call"><i class="fa-solid fa-phone-slash"></i></a>
            </div>
        </div>

        <!-- Chat Sidebar -->
        <div class="chat-sidebar">
            <div class="chat-header">
                <h3>Live Session</h3>
                <i class="fa-solid fa-users" style="color: #888;"></i>
            </div>
            
            <div class="chat-box" id="chatBox"></div>
            
            <div class="input-area">
                <input type="text" id="userInput" placeholder="Send a message...">
                <button class="send-btn" onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>

    </div>

    <script>
        const firebaseConfig = {
            apiKey: "",
            authDomain: "persona-ai-studio-6a1d5.firebaseapp.com",
            databaseURL: "https://persona-ai-studio-6a1d5-default-rtdb.firebaseio.com",
            projectId: "persona-ai-studio-6a1d5",
            storageBucket: "persona-ai-studio-6a1d5.appspot.com",
            messagingSenderId: "300894516972",
            appId: "1:300894516972:web:21D6448e026601b0ff424e"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        database.ref('chat_pipeline/ai_response').on('value', (snapshot) => {
            const data = snapshot.val();
            const chatBox = document.getElementById("chatBox");
            if(data && data.text) {
                const lastMsg = chatBox.lastElementChild;
                if (!lastMsg || !lastMsg.innerHTML.includes(data.text)) {
                    chatBox.innerHTML += `<div class="chat-message ai"><b>AI:</b> ${data.text}</div>`;
                    chatBox.scrollTop = chatBox.scrollHeight;
                }
            }
        });

        function changePersona() {
            const persona = document.getElementById("personaSelect").value;
            const chatBox = document.getElementById("chatBox");
            chatBox.innerHTML = `<div class="chat-message ai"><b>AI:</b> Hello! I am your ${persona}. How can I assist you today?</div>`;
        }

        async function sendMessage() {
            const input = document.getElementById("userInput");
            const chatBox = document.getElementById("chatBox");
            const persona = document.getElementById("personaSelect").value;
            
            if(!input.value.trim()) return;
            
            const userMessage = input.value;
            chatBox.innerHTML += `<div class="chat-message user"><b>YOU:</b> ${userMessage}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
            input.value = "";
            
            database.ref('chat_pipeline/user_request').set({
                persona: persona,
                message: userMessage,
                timestamp: Date.now()
            }).catch(err => {
                chatBox.innerHTML += `<div class="chat-message error">Database Write Error.</div>`;
            });
        }

        let recognition;
        let isListening = false;

        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = false; 
            recognition.lang = 'en-US';     

            recognition.onresult = function(event) {
                document.getElementById('userInput').value = event.results[0][0].transcript; 
                stopListening();
            };
            recognition.onerror = () => stopListening();
            recognition.onend = () => stopListening();
        }

        function toggleVoice() {
            if (!recognition) return;
            const micBtn = document.getElementById('micBtn');
            if (!isListening) {
                recognition.start();
                isListening = true;
                micBtn.classList.add('listening');
                document.getElementById('userInput').placeholder = "Listening to your voice...";
            } else {
                recognition.stop();
                stopListening();
            }
        }

        function stopListening() {
            isListening = false;
            const micBtn = document.getElementById('micBtn');
            if (micBtn) {
                micBtn.classList.remove('listening');
                document.getElementById('userInput').placeholder = "Send a message...";
            }
        }

        window.onload = changePersona;
    </script>
</body>
</html>
